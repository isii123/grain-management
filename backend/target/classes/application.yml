server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/grain_management
    username: grain_management_user
    password: 369515
    driver-class-name: org.postgresql.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isActive
      logic-delete-value: false
      logic-not-delete-value: true
  mapper-locations: classpath*:mapper/**/*.xml

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    com.grain.management: DEBUG
    org.springframework.security: DEBUG

jwt:
  secret: grain-management-secret-key-2024-change-this-in-production
  expiration: 86400000